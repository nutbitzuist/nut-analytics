name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm test

      # Optional: build the Docker image to catch Dockerfile issues early
      - name: Build Docker image (smoke)
        run: docker build -t nut-analytics-ci . --quiet || echo "Docker build step skipped or failed (non-blocking in this CI)"